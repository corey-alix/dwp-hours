# CI/CD Pipeline Light for Azure DevOps

trigger:
  - main

pr:
  - main

pool:
  vmImage: "ubuntu-latest"

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: "20.x"
    displayName: "Setup Node.js"

  - script: npm install -g pnpm@9
    displayName: "Install pnpm"

  - script: pnpm install --frozen-lockfile
    displayName: "Install dependencies"

  - script: pnpm lint
    displayName: "Run linting"

  - script: pnpm build
    displayName: "Run build"

  - script: |
      mkdir -p test-results
      pnpm test:unit -- --reporter=junit --outputFile=test-results/junit-unit.xml
    displayName: "Run unit tests"

  - task: PublishBuildArtifacts@1
    inputs:
      PathtoPublish: "dist"
      ArtifactName: "dist"
    condition: succeeded()
    displayName: "Publish dist artifacts"

  - task: PublishBuildArtifacts@1
    inputs:
      PathtoPublish: "public"
      ArtifactName: "public"
    condition: succeeded()
    displayName: "Publish public artifacts"

  - task: PublishTestResults@2
    inputs:
      testResultsFiles: "test-results/junit-unit.xml"
      testRunTitle: "Unit Tests Results"
    condition: always()
    displayName: "Publish unit test results"
