# CI/CD Pipeline for Azure DevOps
# Builds, tests, and deploys the DWP Hours Tracker to Azure Web App.
#
# Required setup:
#   1. Create an Azure service connection in Azure DevOps:
#      Project Settings → Service connections → New → Azure Resource Manager
#      Name it "azure-dw-time" (or update the variable below).
#   2. The service principal must have Contributor access to the
#      DWP_time_app_RG resource group.

trigger:
  - main

pr:
  - main

variables:
  azureServiceConnection: "azure-dw-time"
  azureAppName: "dw-time"
  azureResourceGroup: "DWP_time_app_RG"
  azureLocation: "eastus2"
  azurePlanName: "dw-pto-time-sp"

pool:
  vmImage: "ubuntu-latest"

steps:
  # ── Build & Test ──────────────────────────────────────────────
  - task: NodeTool@0
    inputs:
      versionSpec: "24.x"
    displayName: "Setup Node.js"

  - script: npm install -g pnpm@9
    displayName: "Install pnpm"

  - script: pnpm install --frozen-lockfile
    displayName: "Install dependencies"

  - script: pnpm lint
    displayName: "Run linting"

  - script: pnpm build
    displayName: "Run build"

  - script: |
      mkdir -p test-results
      pnpm test:unit:ci
    displayName: "Run unit tests"

  - task: PublishBuildArtifacts@1
    inputs:
      PathtoPublish: "dist"
      ArtifactName: "dist"
    condition: succeeded()
    displayName: "Publish dist artifacts"

  - task: PublishBuildArtifacts@1
    inputs:
      PathtoPublish: "public"
      ArtifactName: "public"
    condition: succeeded()
    displayName: "Publish public artifacts"

  - task: PublishTestResults@2
    inputs:
      testResultsFiles: "test-results/junit-unit.xml"
      testRunTitle: "Unit Tests Results"
    condition: always()
    displayName: "Publish unit test results"

  # ── Deploy to Azure (main branch only) ───────────────────────
  - task: AzureCLI@2
    inputs:
      azureSubscription: "$(azureServiceConnection)"
      scriptType: "bash"
      scriptPath: "scripts/deploy-azure.sh"
    env:
      AZURE_APP_NAME: "$(azureAppName)"
      AZURE_RESOURCE_GROUP: "$(azureResourceGroup)"
      AZURE_LOCATION: "$(azureLocation)"
      AZURE_PLAN_NAME: "$(azurePlanName)"
    displayName: "Deploy to Azure Web App"
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
